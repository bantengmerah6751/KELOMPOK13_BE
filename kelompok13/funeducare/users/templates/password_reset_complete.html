<!DOCTYPE html>
{% load static %}
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>{{judul}}</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="{% static 'css/donereset-style.css' %}" rel="stylesheet" />
  </head>
  <body>
    <div
      class="container d-flex justify-content-center align-items-center"
      style="min-height: 100vh"
    >
      <div class="card shadow-lg p-5" style="max-width: 600px; width: 100%">
        <h1 class="text-center mb-4 text-success">
          <i class="bi bi-check-circle-fill"></i> Successfully
        </h1>
        <p class="text-center mb-4">
          Pengaturan kata sandi Anda telah berhasil disimpan. Sekarang Anda
          dapat login dengan kata sandi baru.
        </p>
        <div
          class="d-flex flex-column justify-content-center align-items-center"
        >
          <a href="{% url 'users:login' %}" class="btn btn-primary col-6 mb-3"
            >Login</a
          >
          <p>No,Thanks! <a href="{% url 'home:home' %}">Back to Home</a></p>
        </div>
      </div>
    </div>
  </body>
</html>
