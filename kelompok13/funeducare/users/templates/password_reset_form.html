<!DOCTYPE html>
{% load static %}
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>{{ judul }}</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="{% static 'css/reset_password-style.css' %}" />
  </head>
  <body>
    <!-- Back link section -->
    <div class="home mt-2">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        fill="currentColor"
        class="bi bi-arrow-left"
        viewBox="0 0 16 16"
      >
        <path
          fill-rule="evenodd"
          d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"
        />
      </svg>
      <a href="{% url 'users:login' %}" class="link">Back to Log-In</a>
    </div>

    <!-- Forgot password content -->
    <div class="content-forgot mt-5">
      <div class="text text-center">
        <h1>Forgot Password</h1>
        <p>Masukkan alamat email anda untuk mengirim kode verifikasi</p>
      </div>

      <div>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <input
              type="email"
              placeholder="Masukkan Email Anda"
              class="form-control"
              id="id_email"
              name="email"
              required
              value="{{ form.email.value|default:''}}"
            />
          </div>
          <div class="submit">
            <button type="submit" class="btn">Continue</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
